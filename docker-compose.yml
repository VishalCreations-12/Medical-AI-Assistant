services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ENV: production
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-replace-this-secret-in-real-deployments-32chars}
      CORS_ORIGINS: http://localhost:3000

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16-alpine
    profiles:
      - datastore
    environment:
      POSTGRES_USER: medical
      POSTGRES_PASSWORD: medical
      POSTGRES_DB: medical_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  redis:
    image: redis:7-alpine
    profiles:
      - datastore
    ports:
      - "6379:6379"

volumes:
  postgres_data: {}
